<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa Techniczna - System Offline</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --github-bg: #0d1117;
            --github-panel: #161b22;
            --github-border: #30363d;
            --github-text: #c9d1d9;
            --github-heading: #f0f6fc;
            --error-red: #f85149;
            --error-red-light: #ff7b72;
            --error-red-glow: rgba(248, 81, 73, 0.2);
            --success-green: #2ea043;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--github-bg);
            color: var(--github-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .github-page-container {
            background: var(--github-panel);
            border: 1px solid var(--github-border);
            border-radius: 6px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-size: 2rem;
            color: var(--github-heading);
            margin-bottom: 12px;
        }

        p.description {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #8b949e;
        }

        .countdown-wrapper {
            background-color: #010409;
            border: 1px solid var(--github-border);
            border-radius: 6px;
            padding: 25px;
            display: inline-block;
            margin-bottom: 25px;
        }

        .countdown-grid {
            display: flex;
            gap: 20px;
        }

        .time-value {
            font-family: 'Roboto Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--error-red-light);
        }

        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            display: block;
            color: #6e7681;
        }

        /* Sekcja statusu i loadera */
        .status-area {
            margin-top: 10px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .system-status {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85rem;
            color: var(--error-red);
            padding: 6px 12px;
            border: 1px solid rgba(248, 81, 73, 0.2);
            border-radius: 20px;
        }

        /* Kręcące się kółko (mielenie) */
        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(46, 160, 67, 0.2);
            border-top-color: var(--success-green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none; /* Ukryte podczas odliczania */
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .refresh-hint {
            display: none;
            color: var(--success-green);
            font-weight: 500;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="github-page-container">
        <div class="status-icon" id="mainIcon">⚠️</div>
        <h1 id="title">Przerwa Techniczna</h1>
        <p class="description" id="message">
            Trwa aktualizacja środowiska produkcyjnego. System zostanie odblokowany automatycznie po zakończeniu prac.
        </p>

        <div class="countdown-wrapper">
            <div class="countdown-grid">
                <div>
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">Godz</span>
                </div>
                <div>
                    <span class="time-value" id="minutes">00</span>
                    <span class="time-label">Min</span>
                </div>
                <div>
                    <span class="time-value" id="seconds">00</span>
                    <span class="time-label">Sek</span>
                </div>
            </div>
        </div>

        <div class="status-area">
            <div class="loader" id="loader"></div>
            <div class="system-status" id="statusText">STATUS: MAINTENANCE</div>
            <div class="refresh-hint" id="refreshHint">Gotowe! Odśwież stronę (F5), aby wejść.</div>
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            const target = new Date();
            
            // Ustawienie celu na dzisiaj na 23:54:00
            target.setHours(23, 54, 0, 0);

            const diff = target - now;

            const elH = document.getElementById('hours');
            const elM = document.getElementById('minutes');
            const elS = document.getElementById('seconds');
            const statusText = document.getElementById('statusText');
            const loader = document.getElementById('loader');
            const refreshHint = document.getElementById('refreshHint');
            const mainIcon = document.getElementById('mainIcon');
            const message = document.getElementById('message');
            const title = document.getElementById('title');

            if (diff <= 0) {
                // CZAS MINĄŁ
                elH.innerText = "00";
                elM.innerText = "00";
                elS.innerText = "00";
                
                // Zmiana UI na "mielenie"
                statusText.innerText = "STATUS: SYNCHRONIZING...";
                statusText.style.color = "#2ea043";
                statusText.style.borderColor = "rgba(46, 160, 67, 0.3)";
                
                loader.style.display = "block";
                refreshHint.style.display = "block";
                mainIcon.innerText = "⚙️";
                mainIcon.style.animation = "spin 2s linear infinite";
                
                title.innerText = "Prace zakończone";
                message.innerText = "Dane zostały zsynchronizowane. System oczekuje na ponowne połączenie użytkownika.";
                
                return; // Zatrzymujemy interwał
            }

            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            elH.innerText = h.toString().padStart(2, '0');
            elM.innerText = m.toString().padStart(2, '0');
            elS.innerText = s.toString().padStart(2, '0');
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
