<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerwa Techniczna</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --warning-color: #ff9d00;
            --warning-glow: rgba(255, 157, 0, 0.4);
            --bg-dark: #0a0e17;
            --panel-bg: rgba(15, 20, 30, 0.85);
            --text-light: #e0e6ed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Tło w paski (hazard stripes) dające efekt "w budowie" */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 157, 0, 0.03) 0,
                rgba(255, 157, 0, 0.03) 20px,
                transparent 20px,
                transparent 40px
            );
            z-index: 0;
            pointer-events: none;
        }

        /* Centralny panel */
        .maintenance-card {
            position: relative;
            z-index: 10;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 157, 0, 0.2);
            border-top: 4px solid var(--warning-color);
            border-radius: 16px;
            padding: 50px 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 40px var(--warning-glow);
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ikona ostrzegawcza */
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulseIcon 2s infinite;
            filter: drop-shadow(0 0 10px var(--warning-color));
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p.desc {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #a0aec0;
            margin-bottom: 35px;
        }

        /* Sekcja odliczania */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 157, 0, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            min-width: 100px;
        }

        .time-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--warning-color);
            text-shadow: 0 0 15px var(--warning-glow);
            display: block;
        }

        .time-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #718096;
            margin-top: 5px;
            display: block;
        }

        .status-text {
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            color: var(--warning-color);
            letter-spacing: 3px;
            margin-top: 30px;
            opacity: 0.8;
            animation: blinkText 1.5s infinite;
        }

        @keyframes blinkText {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="icon">⚙️</div>
        <h1>Przerwa Techniczna</h1>
        <p class="desc" id="message">
            Wprowadzamy ważne aktualizacje systemu. Pracujemy nad tym, aby wszystko działało perfekcyjnie. Wracamy do gry punktualnie o północy.
        </p>

        <div class="countdown-container">
            <div class="time-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Godzin</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Minut</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Sekund</span>
            </div>
        </div>

        <div class="status-text">SYSTEM OFFLINE • TRWAJĄ PRACE</div>
    </div>

    <script>
        function updateCountdown() {
            const now = new Date();
            
            // Ustawienie celu na najbliższą północ (24:00 dzisiejszego dnia)
            const midnight = new Date();
            midnight.setHours(24, 0, 0, 0);

            const diff = midnight - now;

            // Elementy HTML
            const elHours = document.getElementById('hours');
            const elMinutes = document.getElementById('minutes');
            const elSeconds = document.getElementById('seconds');
            const elMessage = document.getElementById('message');
            const statusText = document.querySelector('.status-text');

            // Jeśli odliczanie się skończyło
            if (diff <= 0) {
                elHours.innerText = "00";
                elMinutes.innerText = "00";
                elSeconds.innerText = "00";
                elMessage.innerHTML = "<strong>Aktualizacja zakończona!</strong> Trwa uruchamianie systemów, proszę odświeżyć stronę...";
                statusText.innerText = "SYSTEM ONLINE • REBOOT";
                statusText.style.color = "#00ffcc"; // Zmiana koloru na zielony/cyjanowy
                return;
            }

            // Obliczenia czasu
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            // Formatowanie (dodawanie zera z przodu, jeśli liczba jest mniejsza niż 10)
            elHours.innerText = h.toString().padStart(2, '0');
            elMinutes.innerText = m.toString().padStart(2, '0');
            elSeconds.innerText = s.toString().padStart(2, '0');
        }

        // Uruchom odliczanie natychmiast, a potem co 1 sekundę
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
